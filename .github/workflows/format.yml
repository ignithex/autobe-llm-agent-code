name: prettier
on:
  pull_request:
    paths:
      - '**/*.ts'
      - prettier.config.js
      - package.json
jobs:
  Ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      
      - name: Install Dependencies
        run: pnpm install

      - name: Format Check
        run: pnpm run format:check