name: website
on:
  push:
    branches:
      - main
    paths:
      - "packages/*/src/**"
      - "packages/*/package.json"
      - "packages/estimate/reports/benchmark/**"
      - "website/**"
      - "apps/dashboard-ui/**"
      - package.json
      - .github/workflows/website.yml
  pull_request:
    paths:
      - "packages/*/src/**"
      - "packages/*/package.json"
      - "packages/estimate/reports/benchmark/**"
      - "website/**"
      - "apps/dashboard-ui/**"
      - package.json
      - .github/workflows/website.yml
jobs:
  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - name: Root
        run: pnpm install
      - name: Aggregate benchmark data
        run: node apps/dashboard-ui/scripts/aggregate-benchmarks.mjs
      - name: Website
        run: pnpm run build
        working-directory: website
      - name: Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./website/out