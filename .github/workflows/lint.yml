name: lint
on:
  pull_request:
    paths:
      - '**/*.ts'
      - prettier.config.js
      - package.json
jobs:
  Ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v4
      
      - name: Install Dependencies
        run: pnpm install

      - name: Lint Check
        run: pnpm run lint